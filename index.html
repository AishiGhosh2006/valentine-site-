<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Question ❤️</title>
    <!-- Google Fonts for romantic and elegant typography -->
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Floating hearts container -->
    <div id="hearts-container"></div>

    <!-- Main Q&A Container -->
    <div class="glass-container" id="quiz-container">
        <!-- Cute bear GIF -->
        <img id="bear-gif" src="https://media.tenor.com/9wXG2R9XUqUAAAAi/cute-bear.gif" alt="Cute Bear" class="bear" />

        <h1 id="question">Are you ready for a sweet surprise?</h1>
        <p id="subtext">Just answer a few questions first! 😊</p>

        <div class="buttons">
            <button id="btn1" class="btn yes">Yes, Let's Go!</button>
            <button id="btn2" class="btn no">No, Maybe Later</button>
        </div>
    </div>

    <!-- Celebration element hidden by default -->
    <div id="celebration" class="hidden">
        <h2>Yay! I knew you'd say YES! 🥰</h2>
        <p>You just made me the happiest person ever!</p>
        <img src="https://media.tenor.com/gUiu1zyxfzYAAAAi/bear-kiss-bear-kisses.gif" alt="Happy Bears Kissing" />
    </div>

    <script src="script.js"></script>
</body>

</html>
